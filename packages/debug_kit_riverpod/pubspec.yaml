name: debug_kit_riverpod
description: "Riverpod provider observer adapter for DebugKit. Records provider state events into the State tab with sanitization and optional log mirroring."
version: 0.4.0
repository: https://github.com/iamPedram1/debugkit
issue_tracker: https://github.com/iamPedram1/debugkit/issues
topics:
  - logging
  - riverpod
  - state-management
  - devtools
  - debug-kit

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  debug_kit: ^0.10.0
  flutter_riverpod: ">=3.0.0 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
