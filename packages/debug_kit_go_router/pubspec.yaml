name: debug_kit_go_router
description: "GoRouter navigation logging adapter for DebugKit. Automatically logs navigation events with sanitization."
version: 0.4.1
repository: https://github.com/iamPedram1/debugkit
issue_tracker: https://github.com/iamPedram1/debugkit/issues
topics:
  - logging
  - router
  - navigation
  - go-router
  - debug-kit

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  debug_kit: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  go_router: ">=14.0.0 <17.0.0"
