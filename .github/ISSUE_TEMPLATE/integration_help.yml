name: Integration help
description: Get help wiring DebugKit into an app or package setup.
title: "[Help]: "
labels:
  - "type: question"
  - "status: needs triage"

body:
  - type: markdown
    attributes:
      value: |
        Please share the minimum details needed to see what is going wrong.
        Do not paste secrets.

  - type: dropdown
    id: integration_type
    attributes:
      label: Integration type
      options:
        - core overlay
        - Dio
        - GoRouter
        - Riverpod
        - multiple adapters
        - not sure
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Setup code
      render: dart
    validations:
      required: true

  - type: textarea
    id: went_wrong
    attributes:
      label: What went wrong?
      description: Include the error or the unexpected behavior.
      render: text
    validations:
      required: true

  - type: input
    id: flutter_version
    attributes:
      label: Flutter version
      placeholder: "e.g. 3.29.2"
    validations:
      required: true

  - type: input
    id: debug_kit_version
    attributes:
      label: DebugKit version
      placeholder: "e.g. 0.2.2"
    validations:
      required: true

  - type: checkboxes
    id: security_check
    attributes:
      label: Checklist
      options:
        - label: I removed real secrets/tokens/passwords from logs and code.
          required: true

  - type: textarea
    id: pubspec
    attributes:
      label: pubspec snippet
      description: Optional.
      render: yaml

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux

  - type: dropdown
    id: app_shell
    attributes:
      label: App shell
      options:
        - MaterialApp
        - MaterialApp.router

  - type: dropdown
    id: custom_builders
    attributes:
      label: Custom builders / overlays?
      options:
        - "No"
        - "Yes"
        - "Not sure"

  - type: textarea
    id: tried
    attributes:
      label: Steps already tried
      description: Optional.
