name: 🐛 Bug Report
description: Report a reproducible bug in DebugKit or one of its adapters.
title: "[Bug]: "
labels: ["type: bug", "status: needs triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

        > [!IMPORTANT]
        > **Do not paste real tokens, passwords, API keys, or private keys** into this form.
        > If logs contain sensitive data, redact them before submitting.

  - type: dropdown
    id: package
    attributes:
      label: Package Affected
      description: Which DebugKit package is this bug related to?
      options:
        - debug_kit
        - debug_kit_dio
        - debug_kit_go_router
        - debug_kit_riverpod
        - example app
        - not sure
    validations:
      required: true

  - type: textarea
    id: bug_summary
    attributes:
      label: Bug Summary
      description: A short, clear description of the bug.
      placeholder: "e.g. The overlay button disappears when navigating to a new route."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Initialize DebugKit with `DebugKit.init(...)`
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: code_sample
    attributes:
      label: Minimal Code Sample
      description: A minimal snippet that reproduces the bug. Remove any real secrets.
      render: dart

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace / Screenshots
      description: Paste any relevant logs or error output. **Remove secrets before posting.**
      render: text

  - type: input
    id: flutter_version
    attributes:
      label: Flutter Version
      placeholder: "e.g. 3.29.2"
    validations:
      required: true

  - type: input
    id: dart_version
    attributes:
      label: Dart Version
      placeholder: "e.g. 3.7.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform(s)
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: debug_kit_version
    attributes:
      label: DebugKit Version
      placeholder: "e.g. 0.2.2"
    validations:
      required: true

  - type: textarea
    id: package_versions
    attributes:
      label: Adapter Package Versions (if applicable)
      placeholder: |
        debug_kit_dio: 0.1.0
        debug_kit_go_router: 0.1.0
        debug_kit_riverpod: 0.1.0

  - type: dropdown
    id: mode
    attributes:
      label: DebugKit Enabled In
      description: "In which build mode(s) is DebugKit initialized with `enabled: true`?"
      multiple: true
      options:
        - Debug
        - Profile
        - Release
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am **not** reporting a security vulnerability through this public form.
          required: true
        - label: I have removed any real secrets, tokens, or passwords from logs and code samples.
          required: true
