name: Bug report
description: Report a bug in DebugKit or one of its adapters.
title: "[Bug]: "
labels: ["type: bug", "status: needs triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep it short and include only what we need to reproduce it.

        > [!IMPORTANT]
        > **Do not paste real tokens, passwords, API keys, or private keys** into this form.
        > Redact any sensitive data before submitting.

  - type: dropdown
    id: package
    attributes:
      label: Package affected
      options:
        - debug_kit
        - debug_kit_dio
        - debug_kit_go_router
        - debug_kit_riverpod
        - example app
        - not sure
    validations:
      required: true

  - type: textarea
    id: bug_summary
    attributes:
      label: Summary
      placeholder: "Short description of the bug."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Optional.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: What did you see instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: input
    id: flutter_version
    attributes:
      label: Flutter version
      placeholder: "e.g. 3.29.2"
    validations:
      required: true

  - type: input
    id: debug_kit_version
    attributes:
      label: DebugKit version
      placeholder: "e.g. 0.2.2"
    validations:
      required: true

  - type: textarea
    id: code_sample
    attributes:
      label: Code sample
      description: Optional minimal snippet.
      render: dart

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed real secrets/tokens/passwords from logs and code.
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux

  - type: textarea
    id: adapter_versions
    attributes:
      label: Adapter versions
      description: Optional.
      placeholder: |
        debug_kit_dio: 0.1.0
        debug_kit_go_router: 0.1.0
        debug_kit_riverpod: 0.1.0

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional. Remove secrets before posting.
      render: text
